name: Docker Image CI
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} crpi-o5ybjl84oaitrq69.cn-hangzhou.personal.cr.aliyuncs.com
          cd TradingAgents-CN
          # дҪҝз”ЁDockerfileжһ„е»әй•ңеғҸ
          docker build . --file Dockerfile --tag crpi-o5ybjl84oaitrq69.cn-hangzhou.personal.cr.aliyuncs.com/lucifer001/tradingagents-cn:0.0.1
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push crpi-o5ybjl84oaitrq69.cn-hangzhou.personal.cr.aliyuncs.com/lucifer001/tradingagents-cn:0.0.1
